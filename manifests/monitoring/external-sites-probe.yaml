apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: external-sites
  namespace: monitoring
  labels:
    release: monitoring
spec:
  jobName: blackbox-http
  prober:
    url: blackbox-exporter-prometheus-blackbox-exporter.monitoring.svc.cluster.local:9115
  module: http_2xx
  targets:
    staticConfig:
      static:
        - https://google.com
        - https://gitlab.com
        - https://github.com
