apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: waves-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/VA-LEKSEEVA/AgroCD-GitOps.git
    targetRevision: main
    path: manifests/waves
  destination:
    server: https://kubernetes.default.svc
    namespace: wave-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
