fullnameOverride: kps

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 5GB
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi   # уменьшили с 10Gi

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 30s
      repeat_interval: 1h
      receiver: 'telegram'
      routes:
        - matchers:
            - severity = "critical"
          receiver: 'telegram-critical'
          group_wait: 5s
          repeat_interval: 30m
    receivers:
      - name: 'telegram'
        telegram_configs:
          - bot_token: '8803629249:AAGgsVPtKpGdWBgmXtrd3u8_SQDMpKxWXzY'
            chat_id: 7665819292
            parse_mode: 'HTML'
            send_resolved: true
            message: |
              {{ range .Alerts }}
              <b>{{ .Labels.alertname }}</b> [{{ .Labels.severity }}]
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}
      - name: 'telegram-critical'
        telegram_configs:
          - bot_token: '8803629249:AAGgsVPtKpGdWBgmXtrd3u8_SQDMpKxWXzY'
            chat_id: 7665819292
            parse_mode: 'HTML'
            send_resolved: true
            message: |
              🔥🔥🔥 CRITICAL 🔥🔥🔥
              {{ range .Alerts }}
              <b>{{ .Labels.alertname }}</b>
              {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}
    inhibit_rules:
      - source_matchers: [severity="critical"]
        target_matchers: [severity="warning"]
        equal: [alertname, namespace]


grafana:
  adminPassword: "admin"
  service:
    type: ClusterIP
  persistence:
    enabled: true
    size: 2Gi   # уменьшили с 5Gi
  defaultDashboardsTimezone: browser
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'default'
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

nodeExporter:
  enabled: true

kube-state-metrics:
  enabled: true
